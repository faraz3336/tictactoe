services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: nakama
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.20.0
    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "7350:7350"   # HTTP API
      - "7351:7351"   # Console
      - "7349:7349"   # gRPC (optional but useful)

    volumes:
      - ./backend/data/modules:/nakama/data/modules

    command:
      - "--name"
      - "nakama"
      - "--database.address"
      - "postgres://postgres:localdev@postgres:5432/nakama"
      - "--logger.level"
      - "DEBUG"
      - "--console.username"
      - "admin"
      - "--console.password"
      - "password"
      - "--socket.server_key"
      - "defaultkey"

volumes:
  postgres-data: